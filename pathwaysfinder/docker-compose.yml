version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/parts.db
      - PROTENIX_SERVICE_URL=http://protenix:8001
      - ESM_SERVICE_URL=http://esm:8002
      - LLM_SERVICE_URL=http://llm:8003
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  protenix:
    build:
      context: ./services/protenix
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - protenix-cache:/root/checkpoint
      - protenix-output:/app/output
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PROTENIX_OUTPUT_DIR=/app/output
      - PRELOAD_MODEL=protenix_base_default_v1.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  esm:
    build:
      context: ./services/esm
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - esm-cache:/root/.cache
      - esm-output:/app/output
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - ESM_OUTPUT_DIR=/app/output
      - PRELOAD_MODEL=esmfold_v1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    # Upstream Ollama image with CUDA runtime baked in. The model itself
    # is pulled on first call to /goal/parse (or eagerly on startup if
    # the llm service has LLM_PRELOAD=true). Models live in the
    # ollama-models volume so a container restart doesn't re-download.
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  llm:
    build:
      context: ./services/llm
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - OLLAMA_URL=http://ollama:11434
      # Default model. Override via env, e.g. LLM_MODEL=gemma3:9b for
      # an older drop-in or LLM_MODEL=gemma3:4b for low-VRAM machines.
      - LLM_MODEL=${LLM_MODEL:-gemma4:e4b}
      - LLM_PRELOAD=${LLM_PRELOAD:-true}
    depends_on:
      ollama:
        # Wait for ollama to be HEALTHY (daemon ready), not just
        # started. Without this, the llm container's startup-time
        # `ollama pull` and the first /goal/parse request can fail
        # with `Temporary failure in name resolution` because Docker
        # DNS hasn't fully propagated when llm hits ollama:11434.
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  api-data:
  protenix-cache:
  protenix-output:
  esm-cache:
  esm-output:
  ollama-models:
